<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light dark">
<style>
  :root {
    --bg: #ffffff;
    --fg: #1f2328;
    --border: #d0d7de;
    --code-bg: #f6f8fa;
    --blockquote-border: #d0d7de;
    --blockquote-fg: #656d76;
    --link: #0969da;
    --heading-border: #d8dee4;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --fg: #e6edf3;
      --border: #30363d;
      --code-bg: #161b22;
      --blockquote-border: #3d444d;
      --blockquote-fg: #9198a1;
      --link: #4493f8;
      --heading-border: #21262d;
    }
  }
  body.force-light {
    --bg: #ffffff; --fg: #1f2328; --border: #d0d7de;
    --code-bg: #f6f8fa; --blockquote-border: #d0d7de;
    --blockquote-fg: #656d76; --link: #0969da; --heading-border: #d8dee4;
  }
  body.force-dark {
    --bg: #0d1117; --fg: #e6edf3; --border: #30363d;
    --code-bg: #161b22; --blockquote-border: #3d444d;
    --blockquote-fg: #9198a1; --link: #4493f8; --heading-border: #21262d;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.65;
    margin: 0;
    padding: 0;
  }
  #content {
    margin: 0 auto;
    padding: 28px clamp(28px, 4.5vw, 80px) 64px;
  }
  h1, h2, h3, h4, h5, h6 { scroll-margin-top: 12px; font-weight: 600; line-height: 1.25; }
  h1, h2 { border-bottom: 1px solid var(--heading-border); padding-bottom: .3em; }
  h1 { font-size: 2em; margin: .67em 0; }
  h2 { font-size: 1.5em; }
  h3 { font-size: 1.25em; }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code {
    background: var(--code-bg);
    border-radius: 6px;
    font-size: 85%;
    padding: .2em .4em;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
  }
  pre {
    background: var(--code-bg);
    border-radius: 6px;
    overflow-x: auto;
    padding: 16px;
  }
  pre code {
    background: transparent;
    padding: 0;
    font-size: 100%;
    white-space: pre;
  }
  blockquote {
    border-left: .25em solid var(--blockquote-border);
    color: var(--blockquote-fg);
    margin: 0;
    padding: 0 1em;
  }
  table {
    border-collapse: collapse;
    display: block;
    overflow: auto;
    width: max-content;
    max-width: 100%;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 6px 13px;
  }
  tr:nth-child(2n) { background: var(--code-bg); }
  img { max-width: 100%; }
  hr { background-color: var(--border); border: 0; height: .25em; margin: 24px 0; }
  ul.contains-task-list { list-style: none; padding-left: 1.2em; }
  li.task-list-item input[type=checkbox] { margin-right: .5em; }
  .mermaid {
    background: transparent;
    text-align: center;
    margin: 16px 0;
    overflow-x: auto;
    cursor: zoom-in;
  }
  #zoom-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .82);
    display: none;
    z-index: 100;
    overflow: hidden;
    cursor: grab;
  }
  #zoom-overlay.open { display: block; }
  #zoom-content {
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: 0 0;
    background: var(--bg);
    border-radius: 8px;
    padding: 24px;
  }
  #zoom-content svg { display: block; max-width: none !important; }
  #zoom-hint {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, .75);
    font-size: 12px;
    pointer-events: none;
  }
  .mermaid-error {
    border: 1px solid #d1242f;
    border-radius: 6px;
    color: #d1242f;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 12px;
    padding: 12px;
    white-space: pre-wrap;
  }
  .hljs { background: var(--code-bg) !important; }
</style>
<link id="hljs-light" rel="stylesheet" href="highlight-light.min.css">
<link id="hljs-dark" rel="stylesheet" href="highlight-dark.min.css" disabled>
</head>
<body>
<div id="content"></div>
<div id="zoom-overlay">
  <div id="zoom-content"></div>
  <div id="zoom-hint">滚轮/双指缩放 · 拖拽平移 · 点击或 Esc 关闭</div>
</div>

<script src="marked.min.js"></script>
<script src="mermaid.min.js"></script>
<script src="highlight.min.js"></script>
<script>
  let currentTheme = 'auto';
  let mermaidSeq = 0;

  function effectiveDark() {
    if (currentTheme === 'light') return false;
    if (currentTheme === 'dark') return true;
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function applyTheme() {
    const dark = effectiveDark();
    document.body.classList.remove('force-light', 'force-dark');
    if (currentTheme === 'light') document.body.classList.add('force-light');
    if (currentTheme === 'dark') document.body.classList.add('force-dark');
    document.getElementById('hljs-light').disabled = dark;
    document.getElementById('hljs-dark').disabled = !dark;
    mermaid.initialize({ startOnLoad: false, theme: dark ? 'dark' : 'default' });
  }

  // theme: 'light' | 'dark' | 'auto'; re-renders mermaid with matching theme
  function setTheme(theme) {
    currentTheme = theme;
    applyTheme();
    if (lastMarkdown !== null) renderMarkdown(lastMarkdown, lastBaseDir);
  }

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (currentTheme === 'auto') setTheme('auto');
  });

  let headingIds = [];

  function postTOC() {
    const headings = [];
    document.querySelectorAll('#content h1, #content h2, #content h3, #content h4').forEach((h, i) => {
      h.id = 'heading-' + i;
      headings.push({ id: h.id, text: h.textContent, level: parseInt(h.tagName[1]) });
    });
    headingIds = headings.map(h => h.id);
    if (window.webkit?.messageHandlers?.toc) {
      window.webkit.messageHandlers.toc.postMessage(headings);
    }
  }

  // Scroll spy: report the heading currently at the top of the viewport
  let spyTicking = false;
  let lastSpy = null;
  let spySuppressUntil = 0;  // clicked TOC entries win over spy during the scroll animation
  function reportSpy() {
    if (Date.now() < spySuppressUntil) return;
    let current = headingIds[0] || null;
    for (const id of headingIds) {
      const el = document.getElementById(id);
      if (!el) continue;
      if (el.getBoundingClientRect().top <= 100) current = id;
      else break;
    }
    // At the very bottom the last headings can never reach the top of the
    // viewport, so highlight the final section instead.
    if (headingIds.length &&
        window.scrollY + window.innerHeight >= document.documentElement.scrollHeight - 2) {
      current = headingIds[headingIds.length - 1];
    }
    if (current !== lastSpy) {
      lastSpy = current;
      window.webkit?.messageHandlers?.spy?.postMessage(current);
    }
  }
  window.addEventListener('scroll', () => {
    if (spyTicking) return;
    spyTicking = true;
    requestAnimationFrame(() => { spyTicking = false; reportSpy(); });
  }, { passive: true });

  function scrollToHeading(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.scrollIntoView();
    // Keep the clicked heading selected even when the page can't scroll it
    // to the top (e.g. sections near the bottom of the document).
    spySuppressUntil = Date.now() + 800;
    if (lastSpy !== id) {
      lastSpy = id;
      window.webkit?.messageHandlers?.spy?.postMessage(id);
    }
  }

  function resolveRelativeImages(baseDir) {
    if (!baseDir) return;
    const base = 'file://' + encodeURI(baseDir.endsWith('/') ? baseDir : baseDir + '/');
    document.querySelectorAll('#content img').forEach(img => {
      const src = img.getAttribute('src') || '';
      if (src && !/^([a-z]+:)?\/\//i.test(src) && !src.startsWith('file:') && !src.startsWith('data:') && !src.startsWith('/')) {
        img.src = base + src;
      } else if (src.startsWith('/')) {
        img.src = 'file://' + encodeURI(src);
      }
    });
  }

  let lastMarkdown = null;
  let lastBaseDir = null;

  async function renderMarkdown(content, baseDir) {
    lastMarkdown = content;
    lastBaseDir = baseDir || null;
    const scrollY = window.scrollY;

    const html = marked.parse(content, { gfm: true, breaks: false });
    document.getElementById('content').innerHTML = html;

    resolveRelativeImages(lastBaseDir);

    document.querySelectorAll('pre code:not(.language-mermaid)').forEach(block => {
      hljs.highlightElement(block);
    });

    // marked wraps mermaid blocks as <pre><code class="language-mermaid">
    document.querySelectorAll('code.language-mermaid').forEach(block => {
      const pre = block.parentElement;
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.id = 'mermaid-' + (mermaidSeq++);
      div.textContent = block.textContent;
      pre.parentNode.replaceChild(div, pre);
    });
    for (const div of document.querySelectorAll('.mermaid')) {
      const source = div.textContent;
      try {
        await mermaid.run({ nodes: [div] });
        div.title = '点击放大';
        div.addEventListener('click', () => {
          const svg = div.querySelector('svg');
          if (svg) openZoom(svg);
        });
      } catch (e) {
        div.className = 'mermaid-error';
        div.textContent = 'Mermaid error: ' + (e.message || e) + '\n\n' + source;
      }
    }

    postTOC();
    window.scrollTo(0, scrollY);
    lastSpy = null;
    reportSpy();
  }

  // === Diagram zoom overlay: wheel/pinch to zoom, drag to pan ===
  const overlay = document.getElementById('zoom-overlay');
  const zoomContent = document.getElementById('zoom-content');
  let zScale = 1, zX = 0, zY = 0;
  let dragging = false, dragMoved = false, lastX = 0, lastY = 0;

  function applyZoom() {
    zoomContent.style.transform = `translate(${zX}px, ${zY}px) scale(${zScale})`;
  }

  function openZoom(svg) {
    zoomContent.innerHTML = '';
    const clone = svg.cloneNode(true);
    clone.style.maxWidth = 'none';
    const vb = clone.viewBox && clone.viewBox.baseVal;
    const w = (vb && vb.width) || svg.getBoundingClientRect().width || 800;
    const h = (vb && vb.height) || svg.getBoundingClientRect().height || 600;
    clone.setAttribute('width', w);
    clone.setAttribute('height', h);
    zoomContent.appendChild(clone);
    overlay.classList.add('open');
    const pad = 48;
    const fit = Math.min((innerWidth - pad * 2) / w, (innerHeight - pad * 2) / h, 4);
    zScale = fit;
    zX = (innerWidth - w * fit) / 2 - 24 * fit;
    zY = (innerHeight - h * fit) / 2 - 24 * fit;
    applyZoom();
  }

  function closeZoom() {
    overlay.classList.remove('open');
    zoomContent.innerHTML = '';
  }

  overlay.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = Math.exp(-e.deltaY * 0.0022);
    zX = e.clientX - (e.clientX - zX) * factor;
    zY = e.clientY - (e.clientY - zY) * factor;
    zScale *= factor;
    applyZoom();
  }, { passive: false });

  overlay.addEventListener('mousedown', e => {
    dragging = true; dragMoved = false;
    lastX = e.clientX; lastY = e.clientY;
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    zX += e.clientX - lastX; zY += e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    if (Math.abs(e.movementX) + Math.abs(e.movementY) > 1) dragMoved = true;
    applyZoom();
  });
  window.addEventListener('mouseup', () => {
    if (dragging && !dragMoved) closeZoom();
    dragging = false;
  });
  window.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeZoom();
  });

  applyTheme();
</script>
</body>
</html>
