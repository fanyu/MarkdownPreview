<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light dark">
<style>
  :root {
    --bg: #ffffff;
    --fg: #1f2328;
    --border: #d0d7de;
    --code-bg: #f6f8fa;
    --blockquote-border: #d0d7de;
    --blockquote-fg: #656d76;
    --link: #0969da;
    --heading-border: #d8dee4;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --fg: #e6edf3;
      --border: #30363d;
      --code-bg: #161b22;
      --blockquote-border: #3d444d;
      --blockquote-fg: #9198a1;
      --link: #4493f8;
      --heading-border: #21262d;
    }
  }
  body.force-light {
    --bg: #ffffff; --fg: #1f2328; --border: #d0d7de;
    --code-bg: #f6f8fa; --blockquote-border: #d0d7de;
    --blockquote-fg: #656d76; --link: #0969da; --heading-border: #d8dee4;
  }
  body.force-dark {
    --bg: #0d1117; --fg: #e6edf3; --border: #30363d;
    --code-bg: #161b22; --blockquote-border: #3d444d;
    --blockquote-fg: #9198a1; --link: #4493f8; --heading-border: #21262d;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.65;
    margin: 0;
    padding: 0;
  }
  #content {
    max-width: 820px;
    margin: 0 auto;
    padding: 28px 36px 64px;
  }
  h1, h2, h3, h4, h5, h6 { scroll-margin-top: 12px; font-weight: 600; line-height: 1.25; }
  h1, h2 { border-bottom: 1px solid var(--heading-border); padding-bottom: .3em; }
  h1 { font-size: 2em; margin: .67em 0; }
  h2 { font-size: 1.5em; }
  h3 { font-size: 1.25em; }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code {
    background: var(--code-bg);
    border-radius: 6px;
    font-size: 85%;
    padding: .2em .4em;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
  }
  pre {
    background: var(--code-bg);
    border-radius: 6px;
    overflow-x: auto;
    padding: 16px;
  }
  pre code {
    background: transparent;
    padding: 0;
    font-size: 100%;
    white-space: pre;
  }
  blockquote {
    border-left: .25em solid var(--blockquote-border);
    color: var(--blockquote-fg);
    margin: 0;
    padding: 0 1em;
  }
  table {
    border-collapse: collapse;
    display: block;
    overflow: auto;
    width: max-content;
    max-width: 100%;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 6px 13px;
  }
  tr:nth-child(2n) { background: var(--code-bg); }
  img { max-width: 100%; }
  hr { background-color: var(--border); border: 0; height: .25em; margin: 24px 0; }
  ul.contains-task-list { list-style: none; padding-left: 1.2em; }
  li.task-list-item input[type=checkbox] { margin-right: .5em; }
  .mermaid { background: transparent; text-align: center; margin: 16px 0; }
  .mermaid-error {
    border: 1px solid #d1242f;
    border-radius: 6px;
    color: #d1242f;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 12px;
    padding: 12px;
    white-space: pre-wrap;
  }
  .hljs { background: var(--code-bg) !important; }
</style>
<link id="hljs-light" rel="stylesheet" href="highlight-light.min.css">
<link id="hljs-dark" rel="stylesheet" href="highlight-dark.min.css" disabled>
</head>
<body>
<div id="content"></div>

<script src="marked.min.js"></script>
<script src="mermaid.min.js"></script>
<script src="highlight.min.js"></script>
<script>
  let currentTheme = 'auto';
  let mermaidSeq = 0;

  function effectiveDark() {
    if (currentTheme === 'light') return false;
    if (currentTheme === 'dark') return true;
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function applyTheme() {
    const dark = effectiveDark();
    document.body.classList.remove('force-light', 'force-dark');
    if (currentTheme === 'light') document.body.classList.add('force-light');
    if (currentTheme === 'dark') document.body.classList.add('force-dark');
    document.getElementById('hljs-light').disabled = dark;
    document.getElementById('hljs-dark').disabled = !dark;
    mermaid.initialize({ startOnLoad: false, theme: dark ? 'dark' : 'default' });
  }

  // theme: 'light' | 'dark' | 'auto'; re-renders mermaid with matching theme
  function setTheme(theme) {
    currentTheme = theme;
    applyTheme();
    if (lastMarkdown !== null) renderMarkdown(lastMarkdown, lastBaseDir);
  }

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (currentTheme === 'auto') setTheme('auto');
  });

  function postTOC() {
    const headings = [];
    document.querySelectorAll('#content h1, #content h2, #content h3, #content h4').forEach((h, i) => {
      h.id = 'heading-' + i;
      headings.push({ id: h.id, text: h.textContent, level: parseInt(h.tagName[1]) });
    });
    if (window.webkit?.messageHandlers?.toc) {
      window.webkit.messageHandlers.toc.postMessage(headings);
    }
  }

  function scrollToHeading(id) {
    document.getElementById(id)?.scrollIntoView();
  }

  function resolveRelativeImages(baseDir) {
    if (!baseDir) return;
    const base = 'file://' + encodeURI(baseDir.endsWith('/') ? baseDir : baseDir + '/');
    document.querySelectorAll('#content img').forEach(img => {
      const src = img.getAttribute('src') || '';
      if (src && !/^([a-z]+:)?\/\//i.test(src) && !src.startsWith('file:') && !src.startsWith('data:') && !src.startsWith('/')) {
        img.src = base + src;
      } else if (src.startsWith('/')) {
        img.src = 'file://' + encodeURI(src);
      }
    });
  }

  let lastMarkdown = null;
  let lastBaseDir = null;

  async function renderMarkdown(content, baseDir) {
    lastMarkdown = content;
    lastBaseDir = baseDir || null;
    const scrollY = window.scrollY;

    const html = marked.parse(content, { gfm: true, breaks: false });
    document.getElementById('content').innerHTML = html;

    resolveRelativeImages(lastBaseDir);

    document.querySelectorAll('pre code:not(.language-mermaid)').forEach(block => {
      hljs.highlightElement(block);
    });

    // marked wraps mermaid blocks as <pre><code class="language-mermaid">
    document.querySelectorAll('code.language-mermaid').forEach(block => {
      const pre = block.parentElement;
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.id = 'mermaid-' + (mermaidSeq++);
      div.textContent = block.textContent;
      pre.parentNode.replaceChild(div, pre);
    });
    for (const div of document.querySelectorAll('.mermaid')) {
      const source = div.textContent;
      try {
        await mermaid.run({ nodes: [div] });
      } catch (e) {
        div.className = 'mermaid-error';
        div.textContent = 'Mermaid error: ' + (e.message || e) + '\n\n' + source;
      }
    }

    postTOC();
    window.scrollTo(0, scrollY);
  }

  applyTheme();
</script>
</body>
</html>
